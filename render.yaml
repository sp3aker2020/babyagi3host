services:
  # Frontend — Next.js
  - type: web
    name: babyagi3-host-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # Set in Render dashboard
      - key: NEXT_PUBLIC_TREASURY_WALLET
        sync: false
      - key: NEXT_PUBLIC_SOLANA_RPC
        sync: false

  # Backend — Express API
  - type: web
    name: babyagi3-host-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: babyagi3-host-db
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false  # Generate once: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: TREASURY_WALLET_ADDRESS
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BABYAGI_DATA_ROOT
        value: /data/babyagi3-host
      - key: NODE_ENV
        value: production

  # NOTE: For Docker (BabyAGI container management), the API needs access to the Docker socket.
  # On Render, use a privileged Background Worker (private) or point DOCKER_HOST at an external VPS.

databases:
  - name: babyagi3-host-db
    plan: free  # Upgrade as you scale
